; hapStakDemo - PlatformIO project
;
;   pio run -e m5stack-atom   -t upload   ... ATOM Matrix (ESP32)
;   pio run -e m5stack-atoms3 -t upload   ... AtomS3 / AtomS3R (ESP32-S3)

[platformio]
default_envs = m5stack-atoms3

[env]
framework = arduino
platform = espressif32@^6.8.1
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.2.5
    earlephilhower/ESP8266Audio@^1.9.7

; ATOM Matrix (ESP32) : 5x5 LEDマトリクス表示
[env:m5stack-atom]
board = m5stack-atom
board_build.partitions = huge_app.csv
lib_deps =
    ${env.lib_deps}
    fastled/FastLED@^3.9.4

; AtomS3 / AtomS3R (ESP32-S3) : LCD GUI表示（機種はM5Unifiedが自動判別）
[env:m5stack-atoms3]
board = m5stack-atoms3
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
